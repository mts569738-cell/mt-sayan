

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MT.SAYAN</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #121212;
      color: white;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
  .login-container {
      border: 2px solid #FFD700;
      padding: 30px 30px 40px 30px;
      background: #1e1e1e;
      border-radius: 10px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }
  .logo-box {
      width: 100px;
      height: 100px;
      margin: 0 auto 20px auto;
      border: 2px solid #FFD700;
      padding: 8px;
      background: #121212;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  .logo-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  .login-container h2 {
      color: #FFD700;
      margin-bottom: 25px;
      font-size: 28px;
      margin-top: 0;
    }
  .login-container input {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      border: 2px solid white;
      background: #121212;
      color: white;
      border-radius: 5px;
      box-sizing: border-box;
      outline: none;
      font-size: 14px;
    }
  .login-container input:focus {
      border-color: #FFD700;
    }
  .login-container button {
      width: 100%;
      padding: 12px;
      background: #FFD700;
      border: none;
      color: #121212;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 15px;
      font-size: 16px;
    }
  .login-container button:hover {
      background: #e6c200;
    }
  .login-container a {
      color: #FFD700;
      text-decoration: none;
      display: block;
      margin-top: 20px;
      font-size: 14px;
    }
  .login-container a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    
    <!-- Logo Box சேர்த்தாச்சு -->
    <div class="logo-box">
      <img src="mt-sayan-logo.jpeg" alt="MT.SAYAN Logo">
    </div>

    <h2>MT.SAYAN Login</h2>
    <form onsubmit="loginUser(event)">
      <input type="text" id="username" placeholder="Username or Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <a href="layout.html">← Back to Home</a>
  </div>

  <script>
    function loginUser(event) {
      event.preventDefault();
      let user = document.getElementById('username').value;
      let pass = document.getElementById('password').value;
      
      if(user && pass) {
        alert("Welcome " + user + "! Login Successful ✅");
        window.location.href = "layout.html";
      } else {
        alert("Username and Password required!");
      }
    }
  </script>
</body>
</html>
